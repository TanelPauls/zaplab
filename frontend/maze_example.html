<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>5x5 Maze</title>

<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .maze {
    display: grid;
  }

  .point {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    place-self: center;
  }

  .h-wall {
    height: 4px;
    background: white;
    align-self: center;
  }

  .v-wall {
    width: 4px;
    background: white;
    justify-self: center;
  }

  .cell {
    width: 24px;
    height: 24px;
    background: #222;
  }

  .empty {
    background: transparent;
  }
</style>
</head>

<body>

<div id="maze" class="maze"></div>

<script>
const rows = 5;
const cols = 5;

// horizontal walls: (rows+1) x cols
const hWalls = Array.from({ length: rows + 1 }, () =>
  Array(cols).fill(true)
);

// vertical walls: rows x (cols+1)
const vWalls = Array.from({ length: rows }, () =>
  Array(cols + 1).fill(true)
);

// visited cells
const visited = Array.from({ length: rows }, () =>
  Array(cols).fill(false)
);

const dirs = [
  { dr: -1, dc: 0, type: "top" },
  { dr: 1, dc: 0, type: "bottom" },
  { dr: 0, dc: -1, type: "left" },
  { dr: 0, dc: 1, type: "right" }
];

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function carve(r, c) {
  visited[r][c] = true;

  for (const d of shuffle([...dirs])) {
    const nr = r + d.dr;
    const nc = c + d.dc;

    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
    if (visited[nr][nc]) continue;

    // remove wall between cells
    if (d.type === "top") hWalls[r][c] = false;
    if (d.type === "bottom") hWalls[r + 1][c] = false;
    if (d.type === "left") vWalls[r][c] = false;
    if (d.type === "right") vWalls[r][c + 1] = false;

    carve(nr, nc);
  }
}

// generate maze
carve(0, 0);

// render
const maze = document.getElementById("maze");

maze.style.gridTemplateColumns = `repeat(${2 * cols + 1}, 24px)`;
maze.style.gridTemplateRows = `repeat(${2 * rows + 1}, 24px)`;

for (let r = 0; r < 2 * rows + 1; r++) {
  for (let c = 0; c < 2 * cols + 1; c++) {
    const el = document.createElement("div");

    const rowEven = r % 2 === 0;
    const colEven = c % 2 === 0;

    if (rowEven && colEven) {
      el.className = "point";
    } 
    else if (rowEven && !colEven) {
      const hr = r / 2;
      const hc = (c - 1) / 2;
      el.className = hWalls[hr][hc] ? "h-wall" : "empty";
    } 
    else if (!rowEven && colEven) {
      const vr = (r - 1) / 2;
      const vc = c / 2;
      el.className = vWalls[vr][vc] ? "v-wall" : "empty";
    } 
    else {
      el.className = "cell";
    }

    maze.appendChild(el);
  }
}
</script>

</body>
</html>
