services:
  nginx:
    image: nginx:stable
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - frontend_dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - zaplab

  cloudflared:
    build: ./infra/cloudflared
    environment:
      - CLOUDFLARE_TUNNEL_ID=${CLOUDFLARE_TUNNEL_ID}
      - CLOUDFLARED_URL=${CLOUDFLARED_URL}
    volumes:
      - ./infra/cloudflared:/infra/cloudflared
    command: -c "
      envsubst < config.yml.template > config.yml &&
      exec cloudflared --config config.yml tunnel run
      "
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - zaplab

  frontend:
    build:
      context: ./frontend
    volumes:
      - frontend_dist:/app/dist
    networks:
      - zaplab

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    networks:
      - zaplab

volumes:
  frontend_dist:

networks:
  zaplab:
    driver: bridge
